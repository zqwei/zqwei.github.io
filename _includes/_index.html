---
layout: default
title: Home
type: home
---

<main class="py-5">
  <div class="container">
    {% for post in paginator.posts %}
      {% include post.html post=post %}
    {% endfor %}
    {% if paginator.total_pages > 1 %}
      <div class="content-section">
        {% include pagination.html %}
      </div>
    {% endif %}
  </div>
</main>
