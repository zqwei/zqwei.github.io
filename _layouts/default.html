<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="{{ site.author }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="{{ site.keywords }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-tViUnnbplMdV8hkdOiiIHwRIze4humMdS/pDpze9OFPOBhWHlBPkFbGNrDOIQ4m3" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    {% assign profile = site.data.profile %}
    <div class="site-shell">
      {{ content }}
      <footer class="site-footer py-4">
        <div class="container">
          <div class="row">
            <div class="col-12 col-md-6 mb-3 mb-md-0">
              {% for link in profile.footer_links %}
              <a class="footer-link d-block mb-1" href="{{ link.url }}">
                {% include icon.html name=link.icon %} {{ link.label }}
              </a>
              {% endfor %}
            </div>
            <div class="col-12 col-md-6">
              This website is designed by Ziqiang Wei.<br>
              MIT License Copyright (c) 2017 Ziqiang Wei<br>
              Source code is provided at [
              <a href="https://github.com/zqwei/zqwei.github.io" class="footer-link">git repo</a>
              ].
            </div>
          </div>
        </div>
      </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmUMPiRBdVZtmZSVrMfKcvFPdHrp" crossorigin="anonymous"></script>
    <script>
      (function () {
        var fixedNav = document.getElementById('nav-fixed');
        var hero = document.querySelector('.hero-section');
        if (!fixedNav || !hero) return;
        new IntersectionObserver(function (entries) {
          fixedNav.classList.toggle('nav-visible', !entries[0].isIntersecting);
        }, { threshold: 0 }).observe(hero);
      })();
    </script>
  </body>
</html>
