---
layout: default
type: page
---

<nav class="navbar navbar-dark site-navbar shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="{{ '/' | relative_url }}">Back to home</a>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <section class="content-section">
      <div class="card content-card border-0 shadow-sm">
        <div class="card-body p-4 p-lg-5">
          {% if page.title %}
          <header class="mb-4">
            <h1 class="section-title mb-0">{{ page.title }}</h1>
          </header>
          {% endif %}
          {{ content }}
        </div>
      </div>
    </section>
  </div>
</main>
